name: release

# Push a tag like v0.2.0 to cut a release and bump the Homebrew tap formula.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release in this repo

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "keyouse $GITHUB_REF_NAME" \
            --notes "Install: \`brew install yoonhoGo/tap/keyouse\`" \
            --repo "$GITHUB_REPOSITORY"

      - name: Compute source tarball sha256
        id: sha
        run: |
          url="https://github.com/$GITHUB_REPOSITORY/archive/refs/tags/$GITHUB_REF_NAME.tar.gz"
          sha=$(curl -fsSL "$url" | shasum -a 256 | awk '{print $1}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      # Needs a PAT (repo scope) with write access to the tap, stored as secret TAP_GITHUB_TOKEN.
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: yoonhoGo/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Bump formula
        run: |
          f=tap/Formula/keyouse.rb
          sed -i -E "s#/tags/v[0-9]+\.[0-9]+\.[0-9]+\.tar\.gz#/tags/$GITHUB_REF_NAME.tar.gz#" "$f"
          sed -i -E "s#sha256 \"[a-f0-9]*\"#sha256 \"${{ steps.sha.outputs.sha }}\"#" "$f"
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "github-actions[bot]@users.noreply.github.com"
          git -C tap commit -am "keyouse $GITHUB_REF_NAME" && git -C tap push
