name: release

# Push a tag like v0.2.0 to build a universal prebuilt binary, publish a release with it,
# and bump the Homebrew tap formula (url + sha256).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub release in this repo

jobs:
  release:
    runs-on: macos-latest   # full Xcode -> can build a universal (arm64 + x86_64) binary
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version into the binary
        run: |
          ver="${GITHUB_REF_NAME#v}"
          sed -i.bak -E "s/static let version = \"[0-9.]+\"/static let version = \"$ver\"/" Sources/keyouse/Settings.swift
          rm -f Sources/keyouse/Settings.swift.bak

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          bin="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/keyouse"
          mkdir -p dist && cp "$bin" dist/keyouse
          tar -C dist -czf keyouse-macos.tar.gz keyouse
          echo "sha=$(shasum -a 256 keyouse-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
        id: build

      - name: Create GitHub release with the binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "keyouse $GITHUB_REF_NAME" \
            --notes "Prebuilt install: \`brew install yoonhoGo/tap/keyouse\`" \
            --repo "$GITHUB_REPOSITORY" \
            keyouse-macos.tar.gz

      # Needs a PAT (repo scope) with write access to the tap, stored as secret TAP_GITHUB_TOKEN.
      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: yoonhoGo/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Bump formula
        env:
          SHA: ${{ steps.build.outputs.sha }}
        run: |
          f=tap/Formula/keyouse.rb
          ver="${GITHUB_REF_NAME#v}"
          # BSD sed on the macOS runner: -i needs its suffix argument ('' = no backup).
          sed -i '' -E "s#/download/v[0-9]+\.[0-9]+\.[0-9]+/#/download/$GITHUB_REF_NAME/#" "$f"
          sed -i '' -E "s#sha256 \"[a-f0-9]*\"#sha256 \"$SHA\"#" "$f"
          sed -i '' -E "s#version \"[0-9]+\.[0-9]+\.[0-9]+\"#version \"$ver\"#" "$f"
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "github-actions[bot]@users.noreply.github.com"
          git -C tap commit -am "keyouse $GITHUB_REF_NAME" && git -C tap push
